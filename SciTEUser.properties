[Pretty Print JSON]

### No Lua Example - no cleansing and fixing. Works on correct json files
command.name.41.*=📃 JSON Pretty Print
command.mode.41.*=subsystem:0,savebefore:no
command.replace.selection.41.*=1
command.quiet.41.*=1
command.41.*=jq "." <<< '$(CurrentSelection)'
command.shortcut.41.*=Ctrl+Shift+F7

#  For Large JSON files
command.name.42.*=📃 Pretty Print JSON file
command.mode.42.*=subsystem:0,savebefore:no
command.replace.selection.42.*=1
command.quiet.42.*=1
command.42.*=jq "." "$(FileNameExt)"
command.shortcut.42.*=Ctrl+Alt+J

# Format SQL
command.name.43.*=📃 Sleek SQL Format
command.mode.43.*=subsystem:console,savebefore:no
command.replace.selection.43.*=1
command.43.*=sleek -U true <<< """$(CurrentSelection)"""
command.quiet.43.*=1
command.shortcut.43.*=Ctrl+Alt+Q

command.name.44.*=📃 Format SQL file
command.mode.44.*=subsystem:0,savebefore:no
command.replace.selection.44.*=1
command.quiet.44.*=1
command.44.*=sleek "$(FilePath)"
command.shortcut.44.*=Ctrl+Alt+L

